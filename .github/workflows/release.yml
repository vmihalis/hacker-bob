name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Release check
        run: npm run release:check -- --registry --allow-published
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish canonical package
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "hacker-bob-cc@$VERSION" version >/dev/null 2>&1; then
            echo "hacker-bob-cc@$VERSION is already published; skipping."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish alias package
        working-directory: packages/hacker-bob
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "hacker-bob@$VERSION" version >/dev/null 2>&1; then
            echo "hacker-bob@$VERSION is already published; skipping."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
